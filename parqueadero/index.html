<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Parqueadero</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="container">

        <h2 class="text-center ">Control Parqueadero</h2>

        <div class="card ">

            <label>Tipo vehículo</label>
            <select id="tipo" class="form-control">
                <option>Automóvil</option>
                <option>Moto</option>
            </select>

            <label >Placa</label>
            <input id="placa" class="form-control">

            <label >Ingreso</label>
            <input type="datetime-local" id="ingreso" class="form-control">

            <label >Salida</label>
            <input type="datetime-local" id="salida" class="form-control">

            <label >Dinero entregado</label>
            <input type="number" id="pago" class="form-control">

            <button onclick="calcular()" class="btn btn-primary mt-4">
            Calcular
            </button>

            <div class="mt-4" id="resultado"></div>

        </div>

    </div>

    <script src="codigo.js"></script>

</body>
</html>
