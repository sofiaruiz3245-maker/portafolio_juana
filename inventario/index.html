<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inventario Interactivo</title>

    <link rel="stylesheet" href="stilos.css">

    <!-- Fuente -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">

</head>

<body>

<header>
    <h1>Sistema de Inventario</h1>
</header>

<section class="card">

    <h3>Productos</h3>

    <div class="form-grid">

        <label for="nombre">Nombre:</label>

        <select id="nombre">

            <option value="">Seleccione un producto</option>

            <option value="cuadernos">Cuadernos</option>
            <option value="lapiz">Lápiz</option>
            <option value="borrador">Borrador</option>
            <option value="pegante_en_barra">Pegante en barra</option>
            <option value="carpetas">Carpetas</option>
            <option value="marcadores">Marcadores</option>
            <option value="tijeras">Tijeras</option>
            <option value="juego_de_geometria">Juego de geometría</option>
            <option value="corrector_en_cinta">Corrector en cinta</option>
            <option value="block_de_hojas_iris">Block de hojas iris</option>
            <option value="resma_de_papel">Resma de papel</option>
            <option value="boligrafos_portaminas">Bolígrafos y portaminas</option>
            <option value="plastilinas">Plastilinas</option>
            <option value="crayolas">Crayolas</option>
            <option value="pinturas">Pinturas</option>
            <option value="pinceles">Pinceles</option>
            <option value="cartulinas">Cartulinas</option>
            <option value="silicona_liquida">Silicona líquida</option>
            <option value="cinta">Cinta</option>
            <option value="maletas">Maletas</option>
            <option value="escarchas">Escarchas</option>

        </select>


        <div class="producto-preview">

            <img id="previewProducto"
                 src="none.png"
                 alt="Vista previa del producto">

            <button id="btnAgregar"
                    class="btn-form">
                Agregar
            </button>

        </div>


        <label for="cantidad">Cantidad:</label>

        <input type="number"
               id="cantidad"
               min="1"
               required>


        <label for="precio">Precio unitario:</label>

        <input type="number"
               id="precio"
               min="0"
               required>

    </div>

</section>


<section class="card">

    <h3>Inventario</h3>

    <table id="tabla">

        <thead>

            <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Total</th>
                <th>Acciones</th>
            </tr>

        </thead>

        <tbody></tbody>

    </table>

    <div class="total" id="totalGeneral">
        Total general: $0
    </div>

</section>


<script src="codigo.js" defer></script>

</body>
</html>
