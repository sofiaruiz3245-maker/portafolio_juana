<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafeteria</title>
  <link rel="stylesheet" href="stilo.css">
</head>
<body>
  <h1>Zapatos</h1>

  <section class="productos">
    <article class="producto" data-nombre="hamburguesa" data-precio="600000">
      <img src="images/descarga1.jpg" alt="Sneakers">
      <h3>Sneakers</h3>
      <p> $600.000</p>
      <button>Comprar</button> 
    </article>
    <article class="producto" data-nombre="Nike" data-precio="40.000">
      <img src="images/descarga2.jpg" alt="Nike">
      <h3>Nikke</h3>
      <p>$400.000 </p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Vans" data-precio="420000">
      <img src="images/descarga3.jpg" alt="Vans">
      <h3>Vans</h3>
      <p>$ 420.000 </p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Converse" data-precio="380.000 ">
      <img src="images/descarga4.jpg" alt="Converse">
      <h3>Converse</h3>
      <p>$ 380.000 </p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Adidas " data-precio="550.000 ">
      <img src="images/descarga5.jpg" alt="Adidas ">
      <h3>Adidas </h3>
      <p>$ 550.000 </p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="New Balance:" data-precio="600.000 ">
      <img src="images/descarga6.jpg" alt="New Balance:">
      <h3>New Balance:</h3>
      <p>$ 600.000 </p>
      <button>comprar</button>
    </article>
    <article class="producto" data-nombre="dona" data-precio="3500">
      <img src="images/descarga7.jpg" alt="Puma ">
      <h3>Puma </h3>
      <p>$ 450.000 </p>
      <button>comprar</button>
    </article>
<article class="producto" data-nombre="DC " data-precio="360.000 ">
      <img src="images/descarga8.jpg" alt="DC:">
      <h3>DC</h3>
      <p>$ 360.000 </p>
      <button>comprar</button>
    </article>
    <article class="producto" data-nombre="Reebok Classic" data-precio="350.000 ">
      <img src="images/descarga9.jpg" alt="Reebok Classic">
      <h3>Reebok Classic</h3>
      <p>$ 350.000 </p>
      <button>comprar</button>
    </article>
    <article class="producto" data-nombre="Fila" data-precio="380.000 ">
      <img src="images/descarga10.jpg" alt="Fila">
      <h3>Fila</h3>
      <p>$ 380.000 </p>
      <button>comprar</button>
    </article>
  </section>

  <section class="carrito">
    <h2>Carrito de compras</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Item</th>
          <th>Cantidad</th>
          <th>Acción</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="5">Carrito vacío - comience a comprar!</td>
        </tr>
      </tbody>
    </table>
    <h3 id="totalGeneral">Total: $0</h3>
  </section>
  <script src="codigo.js"></script>
</body>
</html>
